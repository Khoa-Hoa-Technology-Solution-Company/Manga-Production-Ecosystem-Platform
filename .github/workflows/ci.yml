name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  frontend:
    name: Frontend (FE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FE/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint

  backend:
    name: Backend (BE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BE
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: BE/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

  mobile:
    name: Mobile (MB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MB
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MB/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint mobile app
        run: npm run lint
